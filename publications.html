<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publications — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Override page-header to include filter bar inline */
    .page-header {
      flex-wrap: wrap;
      gap: 0;
      align-items: stretch;
      padding: 0;
      border-bottom: none;
    }

    .pub-header-left {
      display: flex;
      align-items: flex-end;
      gap: 2rem;
      padding: 3rem 3rem 2.5rem;
      border-bottom: var(--border);
      flex-shrink: 0;
    }

    .pub-controls {
      flex: 1;
      border-left: var(--border);
      border-bottom: var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      justify-content: center;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .filter-label {
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      min-width: 48px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--black);
      padding: 0.2rem 0.65rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--mid);
      transition: all 0.15s;
    }

    .filter-btn:hover { background: var(--light); color: var(--black); }

    .topic-btn.active {
      background: var(--accent);
      color: var(--white);
      border-color: var(--accent);
    }

    .type-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .first-author-btn.active {
      background: #1a5a8b;
      color: var(--white);
      border-color: #1a5a8b;
    }

    .filter-divider {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .pub-count {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-left: auto;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .pub-header-left { border-bottom: var(--border); }
      .pub-controls { border-left: none; border-bottom: var(--border); }
      .page-header { flex-direction: column; }
    }

    .year-group { border-bottom: var(--border); }

    .year-label {
      padding: 0.75rem 3rem;
      background: var(--light);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .pub-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 2rem;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--light);
      transition: background 0.15s;
    }

    .pub-row:last-child { border-bottom: none; }
    .pub-row:hover { background: var(--light); }
    .pub-row.hidden { display: none; }

    .pub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.3rem;
    }

    .pub-title a {
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .pub-title a:hover { color: var(--accent); }

    .pub-meta {
      font-size: 0.75rem;
      color: var(--mid);
      line-height: 1.6;
    }

    .pub-meta strong { color: var(--black); font-weight: 600; }
    .pub-meta .venue { font-style: italic; }

    .pub-tags {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
    }

    .pub-tag {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    .pub-tag.journal     { color: var(--black); }
    .pub-tag.preprint    { color: #6b7280; border-color: #6b7280; }
    .pub-tag.chapter        { color: #5a3b8b; border-color: #5a3b8b; }
    .pub-tag.topic-tag   { font-size: 0.56rem; color: var(--accent); border-color: var(--accent); opacity: 0.75; }

    @media (max-width: 768px) {
      .pub-controls { padding: 1rem 1.25rem; }
      .pub-row { grid-template-columns: 1fr; padding: 1.25rem; gap: 0.75rem; }
      .year-label { padding: 0.5rem 1.25rem; }
      .pub-tags { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="pub-header-left">
      <span class="page-header-num">03</span>
      <h1>Publications</h1>
    </div>

    <div class="pub-controls">
      <div class="filter-row">
        <span class="filter-label">Topic:</span>
        <button class="filter-btn topic-btn active" data-topic="all">All</button>
        <button class="filter-btn topic-btn" data-topic="AI">AI</button>
        <button class="filter-btn topic-btn" data-topic="Genetics">Genetics</button>
        <button class="filter-btn topic-btn" data-topic="Epidemiology">Epidemiology</button>
        <button class="filter-btn topic-btn" data-topic="Psychiatry">Psychiatry</button>
        <button class="filter-btn topic-btn" data-topic="Neuroscience">Neuroscience</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-row">
        <span class="filter-label">Type:</span>
        <button class="filter-btn type-btn active" data-type="all">All</button>
        <button class="filter-btn type-btn" data-type="journal">Journal</button>
        <button class="filter-btn type-btn" data-type="preprint">Preprint</button>
        <button class="filter-btn type-btn" data-type="chapter">Chapter</button>
        <span style="color:var(--mid);opacity:0.4;font-size:0.8rem;margin:0 0.25rem;">|</span>
        <button class="filter-btn first-author-btn" data-firstauthor="true">First Author</button>
        <span class="pub-count" id="pub-count"></span>
      </div>
    </div>
  </div>

  <div id="pub-list"></div>

</div>

<script src="nav.js"></script>
<script>
const PUBLICATIONS = [
  {
    year: 2026,
    title: "A Comprehensive Validation of LLM-Inferred Depression Severity from Outpatient Psychiatry Notes",
    authors: "<strong>M. Cudic*</strong>, W. Meyerson*, ... J. Smoller",
    venue: "in preparation",
    tag: "preprint",
    topics: ["AI", "Psychiatry"],
    firstAuthor: true,
    url: "",
  },
  {
    year: 2026,
    title: "Would Lifting versus Maintaining Covid-19 Containment Policies Have Reduced Psychological Distress in the United States?",
    authors: "<strong>M. Cudic*</strong>, J. de la Hoz*, ... J. Smoller",
    venue: "in Review at Lancet Regional Health - Americas",
    tag: "preprint",
    topics: ["Epidemiology", "Psychiatry"],
    firstAuthor: true,
    url: "https://www.medrxiv.org/content/10.64898/2026.03.06.26347802v1",
  },
  {
    year: 2025,
    title: "Putting Polygenic Scores in Context: How Intersectional Factors Affect Relative and Absolute Genetic Risk",
    authors: "<strong>M. Cudic</strong>, J. Tubbs, T. Ge & J. Smoller",
    venue: "Accepted to American Journal for Human Genetics",
    tag: "preprint",
    topics: ["Genetics", "Psychiatry"],
    firstAuthor: true,
    url: "https://www.medrxiv.org/content/10.1101/2025.06.04.25328987v1",
  },
  {
    year: 2024,
    title: "Neuron Segmentation from Noisy Fluorescence Microscopy Images Using Deep Learning with Local and Global Scale Fusion",
    authors: "<strong>M. Cudic</strong>, J. Diamond & A. Noble",
    venue: "Neuromethods",
    tag: "chapter",
    topics: ["AI", "Neuroscience"],
    firstAuthor: true,
    url: "https://link.springer.com/protocol/10.1007/978-1-0716-4011-1_3",
  },
  {
    year: 2023,
    title: "Unpaired mesh-to-image translation for 3D fluorescent microscopy images of neurons",
    authors: "<strong>M. Cudic</strong>, J. Diamond & A. Noble",
    venue: "Medical Image Analysis",
    tag: "journal",
    topics: ["AI", "Neuroscience"],
    firstAuthor: true,
    url: "https://www.sciencedirect.com/science/article/pii/S1361841523000294",
  },
  {
    year: 2019,
    title: "Using a Recurrent Kernel Learning Machine for Small-Sample Image Classification",
    authors: "<strong>M. Cudic</strong> & J. Principe",
    venue: "International Joint Conference on Neural Networks",
    tag: "journal",
    topics: ["AI"],
    firstAuthor: true,
    url: "https://ieeexplore.ieee.org/document/8852004",
  },
  {
    year: 2018,
    title: "Prediction of sorghum bicolor genotype from in-situ images using autoencoder-identified SNPs",
    authors: "<strong>M. Cudic</strong>, H. Baweja, T. Parhar & S. Nuske",
    venue: "IEEE International Conference on Machine Learning and Applications",
    tag: "journal",
    topics: ["AI", "Genetics"],
    firstAuthor: true,
    url: "https://ieeexplore.ieee.org/document/8614037",
  },
  {
    year: 2018,
    title: "A flexible testing environment for visual question answering with performance evaluation",
    authors: "<strong>M. Cudic</strong>, R. Burt, E. Santana & J. Principe",
    venue: "Neurocomputing",
    tag: "journal",
    topics: ["AI"],
    firstAuthor: true,
    url: "https://www.sciencedirect.com/science/article/abs/pii/S0925231218302315",
  },
  {
    year: 2017,
    title: "Fusing Attention with Visual Question Answering",
    authors: "R. Burt, <strong>M. Cudic</strong> & J. Principe",
    venue: "International Joint Conference on Neural Networks",
    tag: "journal",
    topics: ["AI"],
    firstAuthor: false,
    url: "https://ieeexplore.ieee.org/document/7965954",
  },
];

let activeTopics = new Set(['all']);
let activeType = 'all';
let filterFirstAuthor = false;

function renderPublications(pubs) {
  const container = document.getElementById('pub-list');
  const byYear = {};
  pubs.forEach(p => {
    if (!byYear[p.year]) byYear[p.year] = [];
    byYear[p.year].push(p);
  });

  Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
    const group = document.createElement('div');
    group.className = 'year-group';
    group.innerHTML = `<div class="year-label">${year}</div>`;

    byYear[year].forEach(p => {
      const row = document.createElement('div');
      row.className = 'pub-row';
      row.dataset.tag = p.tag;
      row.dataset.topics = JSON.stringify(p.topics || []);
      row.dataset.firstauthor = p.firstAuthor ? 'true' : 'false';

      const titleHTML = p.url
        ? `<a href="${p.url}" target="_blank">${p.title}</a>`
        : p.title;

      const topicPills = (p.topics || []).map(t =>
        `<span class="pub-tag topic-tag">${t}</span>`
      ).join('');

      row.innerHTML = `
        <div>
          <div class="pub-title">${titleHTML}</div>
          <div class="pub-meta">
            ${p.authors}<br>
            <span class="venue">${p.venue}</span>
          </div>
        </div>
        <div class="pub-tags">
          <span class="pub-tag ${p.tag}">${p.tag}</span>
          ${topicPills}
        </div>`;

      group.appendChild(row);
    });

    container.appendChild(group);
  });

  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.pub-row').forEach(row => {
    const rowTopics = JSON.parse(row.dataset.topics || '[]');
    const rowType = row.dataset.tag;
    const rowFirstAuthor = row.dataset.firstauthor === 'true';
    const topicMatch = activeTopics.has('all') || [...activeTopics].every(t => rowTopics.includes(t));
    const typeMatch = activeType === 'all' || rowType === activeType || (activeType === 'journal' && rowType === 'featured');
    const firstAuthorMatch = !filterFirstAuthor || rowFirstAuthor;
    row.classList.toggle('hidden', !(topicMatch && typeMatch && firstAuthorMatch));
  });

  document.querySelectorAll('.year-group').forEach(g => {
    const anyVisible = [...g.querySelectorAll('.pub-row')].some(r => !r.classList.contains('hidden'));
    g.style.display = anyVisible ? '' : 'none';
  });

  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('.pub-row:not(.hidden)').length;
  document.getElementById('pub-count').textContent = `${visible} publication${visible !== 1 ? 's' : ''}`;
}

// Topic: multi-select
document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    if (topic === 'all') {
      activeTopics = new Set(['all']);
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      activeTopics.delete('all');
      document.querySelector('.topic-btn[data-topic="all"]').classList.remove('active');
      if (activeTopics.has(topic)) {
        activeTopics.delete(topic);
        btn.classList.remove('active');
      } else {
        activeTopics.add(topic);
        btn.classList.add('active');
      }
      if (activeTopics.size === 0) {
        activeTopics.add('all');
        document.querySelector('.topic-btn[data-topic="all"]').classList.add('active');
      }
    }
    applyFilters();
  });
});

// Type: single-select with toggle off
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const alreadyActive = btn.classList.contains('active');
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    if (alreadyActive) {
      activeType = 'all';
      document.querySelector('.type-btn[data-type="all"]').classList.add('active');
    } else {
      btn.classList.add('active');
      activeType = btn.dataset.type;
    }
    applyFilters();
  });
});

// First author: toggle
document.querySelector('.first-author-btn').addEventListener('click', function() {
  filterFirstAuthor = !filterFirstAuthor;
  this.classList.toggle('active', filterFirstAuthor);
  applyFilters();
});

renderPublications(PUBLICATIONS);
</script>
</body>
</html>
