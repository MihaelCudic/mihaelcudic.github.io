<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publications — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── PUBLICATIONS-SPECIFIC ──────────────────────────────── */
    .pub-controls {
      padding: 1.25rem 3rem;
      border-bottom: var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--black);
      padding: 0.3rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--mid);
      transition: all 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .pub-count {
      margin-left: auto;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--mid);
    }

    /* Year group */
    .year-group { border-bottom: var(--border); }

    .year-label {
      padding: 0.75rem 3rem;
      background: var(--light);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    /* Single pub row */
    .pub-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 2rem;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--light);
      transition: background 0.15s;
    }

    .pub-row:last-child { border-bottom: none; }
    .pub-row:hover { background: var(--light); }

    .pub-row.hidden { display: none; }

    .pub-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.3rem;
    }

    .pub-title a {
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .pub-title a:hover { color: var(--accent); }

    .pub-meta {
      font-size: 0.75rem;
      color: var(--mid);
      line-height: 1.6;
    }

    .pub-meta .venue { font-style: italic; }

    .pub-tag {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border: 1px solid currentColor;
      white-space: nowrap;
      align-self: start;
      margin-top: 0.2rem;
    }

    .pub-tag.journal     { color: var(--black); }
    .pub-tag.conference  { color: #1a5a8b; border-color: #1a5a8b; }
    .pub-tag.preprint    { color: #6b7280; border-color: #6b7280; }
    .pub-tag.featured    { background: var(--black); color: var(--white); border-color: var(--black); }
    .pub-tag.book        { color: #5a3b8b; border-color: #5a3b8b; }

    @media (max-width: 768px) {
      .pub-controls { padding: 1rem 1.25rem; }
      .pub-row { grid-template-columns: 1fr; padding: 1.25rem; gap: 0.75rem; }
      .year-label { padding: 0.5rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <span class="page-header-num">03</span>
    <h1>Publications</h1>
  </div>

  <div class="pub-controls">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="journal">Journal</button>
    <button class="filter-btn" data-filter="conference">Conference</button>
    <button class="filter-btn" data-filter="preprint">Preprint</button>
    <span class="pub-count" id="pub-count"></span>
  </div>

  <div id="pub-list"></div>

</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   PUBLICATIONS LIST
   ─────────────────────────────────────────────────────────────
   ADD new publications to the TOP of this array — they will
   automatically appear first (grouped by year, newest first).

   Fields:
     year        — publication year (number)
     title       — full paper title
     authors     — author list as a string
     venue       — journal or conference name
     tag         — "journal" | "conference" | "preprint" | "book" | "featured"
     url         — link to paper (or "" to skip)
   ============================================================ */
const PUBLICATIONS = [

  // ── ADD NEW PUBLICATIONS HERE (at the top) ───────────────── //

  {
    year: 2024,
    title: "Bayesian models of memory reconsolidation under uncertainty",
    authors: "Cudic, M., Patel, R., & Johnson, L.",
    venue: "Nature Human Behaviour",
    tag: "featured",
    url: "",
  },
  {
    year: 2023,
    title: "Language-mediated priming in episodic memory retrieval",
    authors: "Cudic, M. & Chen, W.",
    venue: "Psychological Review",
    tag: "journal",
    url: "",
  },
  {
    year: 2023,
    title: "Trust calibration in human-AI decision systems",
    authors: "Kim, A., Cudic, M., & Morales, D.",
    venue: "Proceedings of CHI 2023",
    tag: "conference",
    url: "",
  },
  {
    year: 2022,
    title: "A unified framework for cognitive load and working memory",
    authors: "Cudic, M., Torres, M., & Liu, Y.",
    venue: "Cognition",
    tag: "journal",
    url: "",
  },
  {
    year: 2022,
    title: "Error recovery strategies in collaborative AI tasks",
    authors: "Cudic, M. & Nguyen, T.",
    venue: "Proceedings of CogSci 2022",
    tag: "conference",
    url: "",
  },
  {
    year: 2021,
    title: "Verbal overshadowing revisited: a Bayesian account",
    authors: "Cudic, M., Patel, R., & Wallace, S.",
    venue: "Cognition",
    tag: "journal",
    url: "",
  },
  {
    year: 2020,
    title: "Probabilistic models of attention in multi-task environments",
    authors: "Cudic, M.",
    venue: "Psychological Science",
    tag: "journal",
    url: "",
  },

];

/* ── RENDER ───────────────────────────────────────────────── */
function renderPublications(pubs) {
  const container = document.getElementById('pub-list');

  // Group by year descending
  const byYear = {};
  pubs.forEach(p => {
    if (!byYear[p.year]) byYear[p.year] = [];
    byYear[p.year].push(p);
  });

  const years = Object.keys(byYear).sort((a, b) => b - a);

  years.forEach(year => {
    const group = document.createElement('div');
    group.className = 'year-group';
    group.innerHTML = `<div class="year-label">${year}</div>`;

    byYear[year].forEach(p => {
      const row = document.createElement('div');
      row.className = 'pub-row';
      row.dataset.tag = p.tag;

      const titleHTML = p.url
        ? `<a href="${p.url}" target="_blank">${p.title}</a>`
        : p.title;

      row.innerHTML = `
        <div>
          <div class="pub-title">${titleHTML}</div>
          <div class="pub-meta">
            ${p.authors}<br>
            <span class="venue">${p.venue}</span>
          </div>
        </div>
        <span class="pub-tag ${p.tag}">${p.tag}</span>`;

      group.appendChild(row);
    });

    container.appendChild(group);
  });

  updateCount();
}

// ── FILTER
function updateCount() {
  const visible = document.querySelectorAll('.pub-row:not(.hidden)').length;
  document.getElementById('pub-count').textContent = `${visible} publication${visible !== 1 ? 's' : ''}`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;

    document.querySelectorAll('.pub-row').forEach(row => {
      const match = filter === 'all' || row.dataset.tag === filter || (filter === 'journal' && row.dataset.tag === 'featured');
      row.classList.toggle('hidden', !match);
    });

    // Hide empty year groups
    document.querySelectorAll('.year-group').forEach(g => {
      const anyVisible = [...g.querySelectorAll('.pub-row')].some(r => !r.classList.contains('hidden'));
      g.style.display = anyVisible ? '' : 'none';
    });

    updateCount();
  });
});

renderPublications(PUBLICATIONS);
</script>
</body>
</html>
