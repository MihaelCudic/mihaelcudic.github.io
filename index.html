<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── ABOUT-SPECIFIC ─────────────────────────────────────── */
    .about-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
    }

    /* LEFT COLUMN */
    .about-sidebar {
      border-right: var(--border);
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .headshot-wrap {
      position: relative;
      width: 220px;
    }

    .headshot-offset {
      position: absolute;
      top: 10px; left: 10px;
      width: 220px; height: 260px;
      border: 1.5px solid var(--accent);
    }

    .headshot-img {
      position: relative;
      z-index: 1;
      width: 220px;
      height: 260px;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: grayscale(10%);
    }

    .sidebar-block h3 {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .sidebar-block p,
    .sidebar-block li {
      font-size: 0.82rem;
      color: var(--mid);
      line-height: 1.75;
    }

    .sidebar-block ul { list-style: none; }
    .sidebar-block li::before { content: '— '; color: var(--accent); }

    .sidebar-links { display: flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-links a {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
    }

    .sidebar-links a::before { content: '↗'; color: var(--accent); }
    .sidebar-links a:hover { color: var(--accent); }

    /* RIGHT COLUMN */
    .about-main {
      padding: 3rem 4rem;
      max-width: 760px;
    }

    .hero-tag {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: var(--black);
      margin-bottom: 2rem;
    }

    .bio-text p {
      font-size: 0.95rem;
      line-height: 1.95;
      color: var(--mid);
      margin-bottom: 1.25rem;
    }

    .bio-text p strong {
      color: var(--black);
      font-weight: 500;
    }

    .stats-row {
      display: flex;
      gap: 0;
      margin-top: 3rem;
      border-top: var(--border);
      border-bottom: var(--border);
    }

    .stat {
      flex: 1;
      padding: 1.5rem 0;
      border-right: var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      display: block;
    }

    .stat-l {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      display: block;
      margin-top: 0.3rem;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .about-layout { grid-template-columns: 1fr; }
      .about-sidebar { border-right: none; border-bottom: var(--border); }
      .about-main { padding: 2rem 1.25rem; }
      .stats-row { flex-wrap: wrap; }
      .stat { min-width: 50%; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="about-layout">

    <!-- SIDEBAR -->
    <aside class="about-sidebar" id="sidebar"></aside>

    <!-- MAIN -->
    <main class="about-main" id="main"></main>

  </div>
</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   EDIT YOUR PROFILE HERE
   ============================================================ */
const user = "mcudic";
const domain = "mgh.harvard.edu";
const PROFILE = {
  name_line1: "Mihael",
  name_line2: "Cudic",
  title: "Postdoctoral Research Fellow",
  department: "Department of Psychiatry",
  university: "Massachusetts General Hospital | Harvard Medical School",
  email: "${user}@${domain}",
  office: "Center for Precision Psychiatry",
  cv: "CV.pdf",
  headshot: "images/headshot.jpg",

  // ── BIO PARAGRAPHS (add more bio_N as needed)
  bio_1: "I am an <strong>Associate Professor</strong> in the Department of Cognitive Science at the University of Somewhere, where I lead the Computational Mind Lab. My work sits at the intersection of cognitive psychology, neuroscience, and machine learning.",
  bio_2: "Before joining the faculty at Somewhere, I completed my PhD at MIT and was a postdoctoral fellow at Stanford's Human-Centered AI Institute. I have been awarded the NSF CAREER Award and the Young Investigator Prize from the Cognitive Science Society.",
  bio_3: "Outside of research, I am deeply committed to open science, reproducibility, and making academic knowledge accessible to broader audiences.",

  // ── STATS
  stats: [
    { number: "42",   label: "Publications" },
    { number: "1.2k", label: "Citations"    },
    { number: "8",    label: "Years Active" },
    { number: "5",    label: "Grants"       },
  ],

  // ── RESEARCH INTERESTS (add or remove lines)
  interests: [
    "Clinical AI",
    "Psychiatric Genetics",
    "Natural Language Processing",
    "Mental Health Epidemiology",
  ],

  // ── EDUCATION (most recent first)
  education: [
    { degree: "DPhil, AI for Biomedical Sciences", institution: "University of Oxford, 2023" },
    { degree: "BSc, Electrical Engineering", institution: "University of Florida, 2018" },
  ],

  // ── SOCIAL LINKS (set to "" to hide)
  links: [
    { label: "Google Scholar", url: "https://scholar.google.com" },
    { label: "ORCID",         url: "https://orcid.org" },
    { label: "GitHub",        url: "https://github.com/mihaelcudic" },
    { label: "Twitter / X",   url: "https://twitter.com" },
  ],
};

/* ============================================================
   RENDER — no need to edit below this line
   ============================================================ */
function buildSidebar(p) {
  const el = document.getElementById('sidebar');

  // Headshot
  el.innerHTML += `
    <div class="headshot-wrap">
      <div class="headshot-offset"></div>
      <img class="headshot-img" src="${p.headshot}" alt="${p.name_line1} ${p.name_line2}"/>
    </div>`;

  // Interests
  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Research Interests</h3>
      <ul>${p.interests.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;

  // Education
  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Education</h3>
      ${p.education.map(e => `<p><strong style="color:var(--black);font-weight:500">${e.degree}</strong><br>${e.institution}</p>`).join('')}
    </div>`;

  // Links
  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Links</h3>
      <div class="sidebar-links">
        ${p.links.filter(l => l.url).map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}
        <a href="${p.cv}">Download CV</a>
      </div>
    </div>`;
}

function buildMain(p) {
  const el = document.getElementById('main');

  // Hero name
  el.innerHTML += `
    <p class="hero-tag">${p.title} · ${p.university}</p>
    <h1 class="hero-name">${p.name_line1}<br><em>${p.name_line2}</em></h1>
    <div class="divider"></div>`;

  // Bio paragraphs (auto-discovers bio_1, bio_2, …)
  let bioHTML = '<div class="bio-text">';
  let i = 1;
  while (p[`bio_${i}`]) { bioHTML += `<p>${p[`bio_${i}`]}</p>`; i++; }
  bioHTML += '</div>';
  el.innerHTML += bioHTML;

  // Stats
  el.innerHTML += `
    <div class="stats-row">
      ${p.stats.map(s => `
        <div class="stat">
          <span class="stat-n">${s.number}</span>
          <span class="stat-l">${s.label}</span>
        </div>`).join('')}
    </div>`;

  document.title = `Dr. ${p.name_line1} ${p.name_line2}`;
}

buildSidebar(PROFILE);
buildMain(PROFILE);
</script>
</body>
</html>
