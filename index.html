<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr. Mihael Čudić</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── ABOUT-SPECIFIC ─────────────────────────────────────── */
    .about-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
    }

    /* LEFT COLUMN */
    .about-sidebar {
      border-right: var(--border);
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .headshot-wrap {
      position: relative;
      width: 220px;
    }

    .headshot-offset {
      position: absolute;
      top: 10px; left: 10px;
      width: 220px; height: 260px;
      border: 1.5px solid var(--accent);
    }

    .headshot-img {
      position: relative;
      z-index: 1;
      width: 220px;
      height: 260px;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: grayscale(10%);
    }

    .sidebar-block h3 {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .sidebar-block p,
    .sidebar-block li {
      font-size: 0.82rem;
      color: var(--mid);
      line-height: 1.75;
    }

    .sidebar-block ul { list-style: none; }
    .sidebar-block li::before { content: '— '; color: var(--accent); }

    .sidebar-links { display: flex; flex-direction: column; gap: 0.4rem; }
    .sidebar-links a {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
    }

    .sidebar-links a::before { content: '↗'; color: var(--accent); }
    .sidebar-links a:hover { color: var(--accent); }

    /* RIGHT COLUMN */
    .about-main {
      padding: 3rem 4rem;
      max-width: 760px;
    }

    .hero-tag {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5vw, 5.5rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    .hero-name em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: var(--black);
      margin-bottom: 2rem;
    }

    .bio-text p {
      font-size: 0.95rem;
      line-height: 1.95;
      color: var(--mid);
      margin-bottom: 1.25rem;
    }

    .bio-text p strong {
      color: var(--black);
      font-weight: 500;
    }

    .stats-row {
      display: flex;
      gap: 0;
      margin-top: 3rem;
      border-top: var(--border);
      border-bottom: var(--border);
    }

    .stat {
      flex: 1;
      padding: 1.5rem 0;
      border-right: var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      display: block;
    }

    .stat-l {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      display: block;
      margin-top: 0.3rem;
    }

    /* ── TALK SECTION ────────────────────────────────────────── */
    .talk-section {
      margin-top: 3.5rem;
      border-top: var(--border);
      padding-top: 2.5rem;
    }

    .talk-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .talk-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      color: var(--black);
    }

    .talk-video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border: var(--border);
    }

    .talk-video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .about-layout { grid-template-columns: 1fr; }
      .about-sidebar { border-right: none; border-bottom: var(--border); }
      .about-main { padding: 2rem 1.25rem; }
      .stats-row { flex-wrap: wrap; }
      .stat { min-width: 50%; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="about-layout">

    <!-- SIDEBAR -->
    <aside class="about-sidebar" id="sidebar"></aside>

    <!-- MAIN -->
    <main class="about-main" id="main"></main>

  </div>
</div>

<script src="nav.js"></script>
<script>
const user = "mcudic";
const domain = "mgh.harvard.edu";
const PROFILE = {
  name_line1: "Mihael",
  name_line2: "Čudić",
  title: "Postdoctoral Research Fellow",
  department: "Department of Psychiatry",
  university: "Massachusetts General Hospital | Harvard Medical School | Broad Institute",
  email: `${user}@${domain}`,
  office: "Center for Precision Psychiatry",
  cv: "CV.pdf",
  headshot: "images/headshot.jpg",

  bio_1: "I am a <strong>Postdoctoral Research Fellow</strong> at the Center for Precision Psychiatry at Massachusetts General Hospital and Harvard Medical School. My work sits at the intersection of clinical AI, psychiatric genetics, and epidemiology.",
  bio_2: "I completed my DPhil in AI for Biomedical Sciences at the University of Oxford as a National Institutes of Health Oxford-Cambridge Scholar, and hold a B.Sc. in Electrical Engineering from the University of Florida, where I graduated Summa Cum Laude.",
  bio_3: "My current research focuses on developing machine learning methods to calibrate polygenic scores to individual environmental contexts, with the goal of improving personalized risk prediction for psychiatric conditions.",

  stats: [
    { number: "7",    label: "Publications" },
    { number: "6",    label: "Years Active" },
    { number: ">$100k",    label: "Grants"  },
  ],

  interests: [
    "Artificial Intelligence",
    "Psychiatric Genetics",
    "Mental Health Epidemiology",
    "Cognitive Neuroscience" 
  ],

  education: [
    { degree: "Postdoc, Precision and Genomic Medicine", institution: "Harvard University, Current" },
    { degree: "DPhil, AI for Biomedical Sciences", institution: "University of Oxford, 2023" },
    { degree: "BSc, Electrical Engineering", institution: "University of Florida, 2018" },
  ],

  links: [
    { label: "Google Scholar", url: "https://scholar.google.com" },
    { label: "ORCID",         url: "https://orcid.org" },
    { label: "GitHub",        url: "https://github.com/mihaelcudic" },
    { label: "Twitter / X",   url: "https://twitter.com" },
  ],
};

function buildSidebar(p) {
  const el = document.getElementById('sidebar');

  el.innerHTML += `
    <div class="headshot-wrap">
      <div class="headshot-offset"></div>
      <img class="headshot-img" src="${p.headshot}" alt="${p.name_line1} ${p.name_line2}"/>
    </div>`;

  el.innerHTML += `
    <div class="sidebar-block">
      <a href="${p.cv}" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.25rem;border:var(--border);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:var(--black);transition:all 0.15s;" onmouseover="this.style.background='var(--black)';this.style.color='var(--white)'" onmouseout="this.style.background='';this.style.color='var(--black)'">
        ↓ &nbsp;Download CV
      </a>
    </div>`;

  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Research Interests</h3>
      <ul>${p.interests.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;

  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Education</h3>
      ${p.education.map(e => `<p><strong style="color:var(--black);font-weight:500">${e.degree}</strong><br>${e.institution}</p>`).join('')}
    </div>`;

  el.innerHTML += `
    <div class="sidebar-block">
      <h3>Links</h3>
      <div class="sidebar-links">
        ${p.links.filter(l => l.url).map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}
      </div>
    </div>`;
}

function buildMain(p) {
  const el = document.getElementById('main');

  el.innerHTML += `
    <p class="hero-tag">${p.title} ·</p>
    <p class="hero-tag">${p.university}</p>
    <h1 class="hero-name">${p.name_line1}<br><em>${p.name_line2}</em></h1>
    <div class="divider"></div>`;

  let bioHTML = '<div class="bio-text">';
  let i = 1;
  while (p[`bio_${i}`]) { bioHTML += `<p>${p[`bio_${i}`]}</p>`; i++; }
  bioHTML += '</div>';
  el.innerHTML += bioHTML;

  el.innerHTML += `
    <div class="stats-row">
      ${p.stats.map(s => `
        <div class="stat">
          <span class="stat-n">${s.number}</span>
          <span class="stat-l">${s.label}</span>
        </div>`).join('')}
    </div>`;

  // Talk section
  el.innerHTML += `
    <div class="talk-section">
      <p class="talk-label">Featured Talk</p>
      <h2 class="talk-title">Listen to my talk at the Broad Institute on AI in Medicine!</h2>
      <div class="talk-video-wrap">
        <iframe
          src="https://www.youtube.com/embed/BpogXKJgrr4"
          title="Broad Institute Talk — AI in Medicine"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>`;

  document.title = `Dr. ${p.name_line1} ${p.name_line2}`;
}

buildSidebar(PROFILE);
buildMain(PROFILE);
</script>
</body>
</html>
