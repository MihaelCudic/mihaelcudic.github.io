<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teaching — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── TEACHING-SPECIFIC ──────────────────────────────────── */
    .teaching-body {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
    }

    /* Level filter sidebar */
    .teaching-sidebar {
      border-right: var(--border);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .sidebar-section-label:first-child { margin-top: 0; }

    .level-btn {
      background: none;
      border: none;
      padding: 0.45rem 0.75rem;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      color: var(--mid);
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .level-btn:hover { color: var(--black); border-left-color: var(--light); }
    .level-btn.active { color: var(--accent); border-left-color: var(--accent); font-weight: 500; }

    /* Course list */
    .courses-list {
      padding: 0;
    }

    .course-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      align-items: start;
      gap: 2rem;
      padding: 2rem 3rem;
      border-bottom: var(--border);
      transition: background 0.15s;
    }

    .course-row:hover { background: var(--light); }
    .course-row.hidden { display: none; }

    .course-code-wrap {
      padding-top: 0.15rem;
    }

    .course-code {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: var(--black);
      display: block;
    }

    .course-year-tag {
      font-size: 0.65rem;
      color: var(--accent);
      margin-top: 0.3rem;
      display: block;
    }

    .course-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .course-desc {
      font-size: 0.82rem;
      color: var(--mid);
      line-height: 1.75;
    }

    .course-level-tag {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--black);
      white-space: nowrap;
      align-self: start;
    }

    .course-level-tag.graduate   { background: var(--black); color: var(--white); }
    .course-level-tag.undergraduate { color: var(--black); }

    @media (max-width: 860px) {
      .teaching-body { grid-template-columns: 1fr; }
      .teaching-sidebar { position: static; height: auto; border-right: none; border-bottom: var(--border); flex-direction: row; flex-wrap: wrap; padding: 1rem 1.25rem; gap: 0.5rem; }
      .sidebar-section-label { width: 100%; margin: 0; }
      .course-row { grid-template-columns: 1fr; padding: 1.5rem 1.25rem; gap: 0.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <span class="page-header-num">04</span>
    <h1>Teaching</h1>
  </div>

  <div class="teaching-body">
    <aside class="teaching-sidebar" id="sidebar">
      <p class="sidebar-section-label">Level</p>
      <button class="level-btn active" data-level="all">All Courses</button>
      <button class="level-btn" data-level="undergraduate">Undergraduate</button>
      <button class="level-btn" data-level="graduate">Graduate</button>
    </aside>

    <div class="courses-list" id="courses-list"></div>
  </div>

</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   COURSES LIST
   ─────────────────────────────────────────────────────────────
   ADD new courses to the TOP of this array — they will appear
   first on the page.

   Fields:
     code        — course code (e.g. "COGS 590")
     level       — "undergraduate" | "graduate"
     title       — course title
     description — one or two sentence description
     years       — string like "2022–present" or "2019, 2021"
   ============================================================ */
const COURSES = [

  // ── ADD NEW COURSES HERE (at the top) ────────────────────── //

  {
    code: "IDH3931",
    level: "undergraduate",
    title: "Artificial Intelligence Applications for Psychiatry @ University of Florida",
    description: "Training in experimental design, open science practices, and statistical modeling for graduate researchers.",
    years: "2024t",
  },
  {
    code: "COGS 510",
    level: "Engineering Computation at University of Oxford",
    title: "Computational Models of Mind",
    description: "An intensive graduate seminar on probabilistic and neural models of cognition, with a hands-on modeling lab component.",
    years: "2022",
  },
  {
    code: "EEL 58400",
    level: "graduate",
    title: "Elements of Machine Intelligence at University of Florida",
    description: "An advanced course on the psychology and neuroscience of human memory systems, from encoding to retrieval.",
    years: "2017",
  },
  {
    code: "CEEL 3111",
    level: "undergraduate",
    title: "ICircuits",
    description: "A broad survey of the interdisciplinary field of cognitive science, covering perception, memory, language, and reasoning.",
    years: "2016",
  },

];

/* ── RENDER ───────────────────────────────────────────────── */
function renderCourses(courses) {
  const list = document.getElementById('courses-list');
  courses.forEach(c => {
    const row = document.createElement('div');
    row.className = 'course-row';
    row.dataset.level = c.level;
    row.innerHTML = `
      <div class="course-code-wrap">
        <span class="course-code">${c.code}</span>
        <span class="course-year-tag">${c.years}</span>
      </div>
      <div>
        <div class="course-title">${c.title}</div>
        <p class="course-desc">${c.description}</p>
      </div>
      <span class="course-level-tag ${c.level}">${c.level}</span>`;
    list.appendChild(row);
  });
}

// ── FILTER
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const level = btn.dataset.level;
    document.querySelectorAll('.course-row').forEach(row => {
      row.classList.toggle('hidden', level !== 'all' && row.dataset.level !== level);
    });
  });
});

renderCourses(COURSES);
</script>
</body>
</html>
