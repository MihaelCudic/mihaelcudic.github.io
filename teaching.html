<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teaching — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── TEACHING-SPECIFIC ──────────────────────────────────── */
    .teaching-body {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
    }

    /* Level filter sidebar */
    .teaching-sidebar {
      border-right: var(--border);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .sidebar-section-label:first-child { margin-top: 0; }

    .level-btn {
      background: none;
      border: none;
      padding: 0.45rem 0.75rem;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      color: var(--mid);
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .level-btn:hover { color: var(--black); border-left-color: var(--light); }
    .level-btn.active { color: var(--accent); border-left-color: var(--accent); font-weight: 500; }

    /* Course list */
    .courses-list {
      padding: 0;
    }

    .course-row {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      padding: 2rem 3rem;
      border-bottom: var(--border);
      transition: background 0.15s;
    }

    .course-row:hover { background: var(--light); }
    .course-row.hidden { display: none; }

    .course-role-tag-wrap {
      padding-top: 0.2rem;
      flex-shrink: 0;
      width: 130px;
    }

    .course-role {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border: 1px solid currentColor;
      white-space: nowrap;
      display: inline-block;
    }

    .course-role.professor { color: var(--accent); border-color: var(--accent); font-weight: 600; }
    .course-role.ta { color: var(--mid); border-color: var(--mid); }

    .course-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .course-title-line {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .course-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .course-code {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--mid);
    }

    .course-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .meta-sep {
      color: var(--mid);
      opacity: 0.4;
      font-size: 0.72rem;
    }

    .course-institution {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .course-year {
      font-size: 0.72rem;
      color: var(--accent);
    }

    .course-level-tag {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--black);
      white-space: nowrap;
    }

    .course-level-tag.graduate   { background: var(--black); color: var(--white); }
    .course-level-tag.undergraduate { color: var(--black); }

    .course-syllabus-line { margin-top: 0.1rem; }

    .course-syllabus {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      border-bottom: 1px solid var(--black);
      transition: color 0.15s;
    }

    .course-syllabus:hover { color: var(--accent); border-color: var(--accent); }

    .course-desc {
      font-size: 0.82rem;
      color: var(--mid);
      line-height: 1.75;
      margin-top: 0.15rem;
    }

    .course-rating-block {
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      border-left: 2px solid var(--accent);
      background: var(--light);
    }

    .course-rating-line {
      font-size: 0.72rem;
      color: var(--black);
      margin-bottom: 0.4rem;
    }

    .course-rating-line strong { color: var(--accent); }

    .course-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--mid);
      line-height: 1.5;
    }

    .course-quote-attr {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 0.3rem;
    }

    @media (max-width: 860px) {
      .teaching-body { grid-template-columns: 1fr; }
      .teaching-sidebar { position: static; height: auto; border-right: none; border-bottom: var(--border); flex-direction: row; flex-wrap: wrap; padding: 1rem 1.25rem; gap: 0.5rem; }
      .sidebar-section-label { width: 100%; margin: 0; }
      .course-row { flex-direction: column; padding: 1.5rem 1.25rem; gap: 0.5rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <h1>Teaching</h1>
  </div>

  <div class="teaching-body">
    <aside class="teaching-sidebar" id="sidebar">
      <p class="sidebar-section-label">Level</p>
      <button class="level-btn active" data-level="all">All Courses</button>
      <button class="level-btn" data-level="undergraduate">Undergraduate</button>
      <button class="level-btn" data-level="graduate">Graduate</button>
    </aside>

    <div class="courses-list" id="courses-list"></div>
  </div>

</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   COURSES LIST
   ─────────────────────────────────────────────────────────────
   ADD new courses to the TOP of this array — they will appear
   first on the page.

   Fields:
     code        — course code (e.g. "COGS 590")
     level       — "undergraduate" | "graduate"
     title       — course title
     description — one or two sentence description
     years       — string like "2022–present" or "2019, 2021"
   ============================================================ */
const COURSES = [

  {
    code: "IDH3931",
    level: "undergraduate",
    role: "professor",
    roleLabel: "Professor",
    title: "AI Applications for Psychiatry",
    institution: "University of Florida",
    description: "ML methods for medical data, deep learning and generative AI, neurobiology and clinical psychiatry, and AI-driven approaches to understanding and predicting psychiatric conditions.",
    years: "2024",
    syllabus: "https://www.honors.ufl.edu/media/honorsufledu/syllabi/spring-24/IDH3931-MC01_30214-AI-Applications-for-Psychiatry-Cudic_syllabus.pdf",
    rating: "4.8 / 5.0",
    quote: "The topics covered by the course were extremely engaging and interesting.",
    quoteAttr: "Student evaluation",
  },
  {
    code: "",
    level: "undergraduate",
    role: "ta",
    roleLabel: "Teaching Assistant",
    title: "Engineering Computation",
    institution: "University of Oxford",
    description: "Numerical methods, optimization algorithms, and implementing machine learning fundamentals.",
    years: "2022",
    rating: "",
    syllabus: "",
  },
  {
    code: "EEL5840",
    level: "graduate",
    role: "ta",
    roleLabel: "Teaching Assistant",
    title: "Elements of Machine Intelligence",
    institution: "University of Florida",
    description: "Neural networks, pattern recognition, probabilistic models, and intelligent system design.",
    years: "2017",
    rating: "",
    syllabus: "",
  },
  {
    code: "EEL3111",
    level: "undergraduate",
    role: "ta",
    roleLabel: "Teaching Assistant",
    title: "Circuits",
    institution: "University of Florida",
    description: "Fundamental circuit theory, analysis techniques, and the behavior of electrical components and systems.",
    years: "2016",
    rating: "",
    syllabus: "",
  },

];

/* ── RENDER ───────────────────────────────────────────────── */
function renderCourses(courses) {
  const list = document.getElementById('courses-list');
  courses.forEach(c => {
    const row = document.createElement('div');
    row.className = 'course-row';
    row.dataset.level = c.level;

    const titleLine = [
      `<span class="course-title">${c.title}</span>`,
      c.code ? `<span class="course-code">${c.code}</span>` : '',
    ].filter(Boolean).join(' ');

    const metaLine = [
      `<span class="course-institution">${c.institution}</span>`,
      `<span class="course-year">${c.years}</span>`,
      `<span class="course-level-tag ${c.level}">${c.level}</span>`,
    ].join('<span class="meta-sep">·</span>');

    const syllabusLine = c.syllabus
      ? `<div class="course-syllabus-line"><a class="course-syllabus" href="${c.syllabus}" target="_blank">↗ Syllabus</a></div>`
      : '';

    const ratingBlockHTML = c.rating ? `
      <div class="course-rating-block">
        <div class="course-rating-line">Course Rating: <strong>${c.rating}</strong></div>
        ${c.quote ? `<div class="course-quote">"${c.quote}"</div>
        <div class="course-quote-attr">— ${c.quoteAttr || 'Student evaluation'}</div>` : ''}
      </div>` : '';

    row.innerHTML = `
      <div class="course-role-tag-wrap">
        <span class="course-role ${c.role}">${c.roleLabel}</span>
      </div>
      <div class="course-body">
        <div class="course-title-line">${titleLine}</div>
        <div class="course-meta">${metaLine}</div>
        ${syllabusLine}
        <p class="course-desc">${c.description}</p>
        ${ratingBlockHTML}
      </div>`;
    list.appendChild(row);
  });
}

// ── FILTER
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const level = btn.dataset.level;
    document.querySelectorAll('.course-row').forEach(row => {
      row.classList.toggle('hidden', level !== 'all' && row.dataset.level !== level);
    });
  });
});

renderCourses(COURSES);
</script>
</body>
</html>
</html>
