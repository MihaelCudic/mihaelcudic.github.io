<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── RESEARCH-SPECIFIC ──────────────────────────────────── */

    /* Each theme is a full-width horizontal band */
    .theme {
      border-bottom: var(--border);
      display: flex;
    }

    /* Alternate image side */
    .theme:nth-child(even) { flex-direction: row-reverse; }

    /* IMAGE PANEL */
    .theme-image {
      border-right: var(--border);
      position: relative;
      overflow: hidden;
      background: #ffffff;
      width: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 2rem;
    }

    .theme:nth-child(even) .theme-image { border-right: none; border-left: var(--border); }

    .theme-image img {
      max-width: 100%;
      max-height: calc(100vh - 56px);
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      filter: grayscale(20%);
      transition: filter 0.4s, transform 0.5s;
    }

    .theme-image:hover img {
      filter: grayscale(0%);
      transform: scale(1.02);
    }

    /* Hover overlay with caption text */
    .theme-image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14, 14, 14, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .theme-image:hover .theme-image-overlay {
      opacity: 1;
    }

    .theme-image-overlay-text {
      color: #f5f3ee;
      font-size: 0.82rem;
      line-height: 1.75;
      text-align: center;
      letter-spacing: 0.03em;
    }

    /* Placeholder when no image */
    .theme-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: rgba(0,0,0,0.2);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .theme-image-placeholder svg { opacity: 0.2; }

    /* CONTENT PANEL */
    .theme-content {
      padding: 3.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      flex: 1;
      align-self: flex-start;
    }

    .theme-index {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .theme-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 2.5vw, 2.5rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .theme-desc {
      font-size: 0.88rem;
      color: var(--mid);
      line-height: 1.85;
      max-width: 52ch;
    }

    /* PAPER PILLS under description */
    .theme-papers {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .paper-pill {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--mid);
      border-left: 2px solid var(--light);
      padding-left: 0.75rem;
      transition: border-color 0.15s;
    }

    .paper-pill:hover { border-color: var(--accent); }

    .paper-pill a {
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .paper-pill a:hover { color: var(--accent); }

    .paper-venue {
      color: var(--mid);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }



    @media (max-width: 860px) {
      .theme { flex-direction: column !important; }
      .theme-image { width: 100%; border-right: none; border-bottom: var(--border); }
      .theme:nth-child(even) .theme-image { border-left: none; border-bottom: var(--border); }
      .theme-content { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <span class="page-header-num">02</span>
    <h1>Research</h1>
  </div>

  <div id="themes-container"></div>

</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   RESEARCH THEMES
   ─────────────────────────────────────────────────────────────
   ADD a new theme object to the TOP of this array to have it
   appear first on the page. Each theme has:

     title       — theme name
     description — paragraph describing this line of work
     image       — filename in the images/ folder (or "" for none)
     image_caption — short caption shown over the image
     papers      — list of { title, venue, url } (url optional)

   To add a new theme: copy one block, paste at the top, edit.
   ============================================================ */
const THEMES = [

  // ── ADD NEW THEMES ABOVE THIS LINE ──────────────────────── //

  {
    title: "LLMs for Psychiatric Clinical Notes",
    description: "Standardized depression assessments such as the PHQ-9 are administered infrequently in routine outpatient care — yet clinicians produce detailed notes at every encounter. Can large language models (LLMs) extract clinically meaningful depression severity from this unstructured text? Across 91,651 outpatient psychiatry notes from 8,287 patients, LLM-inferred depression severity demonstrated moderate correspondence with patient-reported PHQ-9 and stronger agreement with clinician chart review assessments. Notably, LLM-inferred scores predicted psychiatric emergency visits with accuracy comparable to patient-reported PHQ-9. These findings have implications for scalable, longitudinal phenotyping of depression severity to support genetic, pharmacoepidemiologic, and treatment effectiveness research using real-world clinical data.",
    image: "",   // e.g. "images/research-human-ai.jpg"
    image_caption: "",
    papers: [
      { title: "LLM-Inferred Depression Severity from Clinical Notes Predicts Psychiatric Emergency Visits", venue: "in preparation", url: "" },
    ],
  },

  {
    title: "Putting Genetics in Context",
    description: "Polygenic scores offer a promising tool for individual disease risk stratification, yet their predictive validity is known to vary across ancestries and sociodemographic contexts. In an analysis of 375,000 UK Biobank participants with replication in the All of Us cohort, we examined how genetic risk estimates for seven common diseases — including depression — change across 106 intersecting combinations of sex, age, income, and lifestyle factors. Estimated odds ratios for high-PGS individuals varied by an average of 56% across intersectional contexts, with meaningful differences in absolute risk after adjusting for context prevalence. These findings suggest that future clinical applications of polygenic scores may require integration of contextual factors to improve both accuracy and equity in individual-level risk assessment.",
    image: "",   // e.g. "images/research-language.jpg"
    image_caption: "",
    papers: [
      { title: "Putting Polygenic Scores in Context: How Intersectional Factors Affect Relative and Absolute Genetic Risk", venue: "Accepted to AJHG, 2026", url: "https://www.medrxiv.org/content/10.1101/2025.06.04.25328987v1" },
    ],
  },

  {
    title: "Did COVID-19 Lockdowns Harm Mental Health — And For How Long?",
    description: "COVID-19 containment policies led to widespread disruptions of daily life, with a growing body of evidence documenting their detrimental effects on mental health. However, it remains unclear to what extent these mental health outcomes are attributable specifically to containment policies rather than to other pandemic-related stressors (e.g., infections and deaths). When disentangling the effects of containment policies from those of the pandemic itself, we find insufficient evidence that prolonged containment policies in the first year of the pandemic had a lasting impact on population-level psychological distress.",
    image: "images/covid_1.png",
    image_caption: "",
    papers: [
      { title: "Would Lifting versus Maintaining Covid-19 Containment Policies Have Reduced Psychological Distress in the United States?", venue: "in review at Nature Mental Health", url: "" },
    ],
  },

];

/* ── RENDER ───────────────────────────────────────────────── */
function renderThemes(themes) {
  const container = document.getElementById('themes-container');
  themes.forEach((t, i) => {
    const imageHTML = t.image
      ? `<img src="${t.image}" alt="${t.title}"/>
         <div class="theme-image-overlay">
           <p class="theme-image-overlay-text">${t.image_caption || t.title}</p>
         </div>`
      : `<div class="theme-image-placeholder">
           <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
             <rect x="3" y="3" width="18" height="18" rx="1"/>
             <circle cx="8.5" cy="8.5" r="1.5"/>
             <polyline points="21 15 16 10 5 21"/>
           </svg>
           <span>Upload image to<br>images/ folder</span>
         </div>`;

    const papersHTML = t.papers.length
      ? `<div class="theme-papers">
          ${t.papers.map(p => `
            <div class="paper-pill">
              ${p.url ? `<a href="${p.url}" target="_blank">${p.title}</a>` : `<span style="color:var(--black)">${p.title}</span>`}
              <span class="paper-venue">${p.venue}</span>
            </div>`).join('')}
         </div>`
      : '';

    container.innerHTML += `
      <div class="theme">
        <div class="theme-image">${imageHTML}</div>
        <div class="theme-content">
          <h2 class="theme-title">${t.title}</h2>
          <p class="theme-desc">${t.description}</p>
          ${papersHTML}
        </div>
      </div>`;
  });
}

renderThemes(THEMES);
</script>
</body>
</html>
