<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research — Dr. Mihael Cudic</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── RESEARCH-SPECIFIC ──────────────────────────────────── */

    /* Each theme is a full-width horizontal band */
    .theme {
      border-bottom: var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 480px;
    }

    /* Alternate image side */
    .theme:nth-child(even) { direction: rtl; }
    .theme:nth-child(even) > * { direction: ltr; }

    /* IMAGE PANEL */
    .theme-image {
      border-right: var(--border);
      position: relative;
      overflow: hidden;
      background: var(--light);
      min-height: 380px;
    }

    .theme:nth-child(even) .theme-image { border-right: none; border-left: var(--border); }

    .theme-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(20%);
      transition: filter 0.4s, transform 0.5s;
    }

    .theme:hover .theme-image img {
      filter: grayscale(0%);
      transform: scale(1.02);
    }

    /* Placeholder when no image */
    .theme-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: rgba(0,0,0,0.2);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 380px;
    }

    .theme-image-placeholder svg { opacity: 0.2; }

    /* CONTENT PANEL */
    .theme-content {
      padding: 3.5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
    }

    .theme-index {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .theme-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 2.5vw, 2.5rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .theme-desc {
      font-size: 0.88rem;
      color: var(--mid);
      line-height: 1.85;
      max-width: 52ch;
    }

    /* PAPER PILLS under description */
    .theme-papers {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .paper-pill {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--mid);
      border-left: 2px solid var(--light);
      padding-left: 0.75rem;
      transition: border-color 0.15s;
    }

    .paper-pill:hover { border-color: var(--accent); }

    .paper-pill a {
      text-decoration: none;
      color: var(--black);
      transition: color 0.15s;
    }

    .paper-pill a:hover { color: var(--accent); }

    .paper-venue {
      color: var(--mid);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* IMAGE CAPTION */
    .theme-image-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.6rem 1rem;
      background: rgba(14,14,14,0.7);
      color: rgba(255,255,255,0.65);
      font-size: 0.65rem;
      letter-spacing: 0.07em;
    }

    @media (max-width: 860px) {
      .theme { grid-template-columns: 1fr; direction: ltr; min-height: auto; }
      .theme-image { min-height: 260px; border-right: none; border-bottom: var(--border); }
      .theme:nth-child(even) .theme-image { border-left: none; border-bottom: var(--border); }
      .theme-content { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <span class="page-header-num">02</span>
    <h1>Research</h1>
  </div>

  <div id="themes-container"></div>

</div>

<script src="nav.js"></script>
<script>
/* ============================================================
   RESEARCH THEMES
   ─────────────────────────────────────────────────────────────
   ADD a new theme object to the TOP of this array to have it
   appear first on the page. Each theme has:

     title       — theme name
     description — paragraph describing this line of work
     image       — filename in the images/ folder (or "" for none)
     image_caption — short caption shown over the image
     papers      — list of { title, venue, url } (url optional)

   To add a new theme: copy one block, paste at the top, edit.
   ============================================================ */
const THEMES = [

  // ── ADD NEW THEMES ABOVE THIS LINE ──────────────────────── //

  {
    title: "Human-AI Collaboration",
    description: "How do humans and AI systems build shared understanding during complex cognitive tasks? This line of work investigates trust calibration, error recovery strategies, and the conditions under which human-AI teams outperform either alone. We combine behavioral experiments with computational modeling to develop practical design guidelines.",
    image: "",   // e.g. "images/research-human-ai.jpg"
    image_caption: "",
    papers: [
      { title: "Trust calibration in human-AI decision systems", venue: "CHI 2023", url: "" },
      { title: "Error recovery strategies in collaborative AI tasks", venue: "CogSci 2022", url: "" },
    ],
  },

  {
    title: "Language & Memory",
    description: "Language is not merely a vehicle for expressing memories—it actively shapes what we remember and how we retrieve it. Using a combination of fMRI, EEG, and large-scale behavioral experiments, we examine how linguistic framing during encoding and retrieval alters the fidelity and phenomenology of episodic memories.",
    image: "",   // e.g. "images/research-language.jpg"
    image_caption: "",
    papers: [
      { title: "Language-mediated priming in episodic memory retrieval", venue: "Psychological Review, 2023", url: "" },
      { title: "Verbal overshadowing revisited: a Bayesian account", venue: "Cognition, 2021", url: "" },
    ],
  },

  {
    title: "Computational Cognition",
    description: "We develop Bayesian and neural network models of human reasoning and decision-making under uncertainty. A central goal is to understand why human cognition deviates from ideal rationality in systematic, predictable ways—and to build models that capture these deviations without sacrificing explanatory precision.",
    image: "",   // e.g. "images/research-computational.jpg"
    image_caption: "",
    papers: [
      { title: "Bayesian models of memory reconsolidation under uncertainty", venue: "Nature Human Behaviour, 2024", url: "" },
      { title: "A unified framework for cognitive load and working memory", venue: "Cognition, 2022", url: "" },
    ],
  },

];

/* ── RENDER ───────────────────────────────────────────────── */
function renderThemes(themes) {
  const container = document.getElementById('themes-container');
  themes.forEach((t, i) => {
    const imageHTML = t.image
      ? `<img src="${t.image}" alt="${t.title}"/>
         ${t.image_caption ? `<p class="theme-image-caption">${t.image_caption}</p>` : ''}`
      : `<div class="theme-image-placeholder">
           <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
             <rect x="3" y="3" width="18" height="18" rx="1"/>
             <circle cx="8.5" cy="8.5" r="1.5"/>
             <polyline points="21 15 16 10 5 21"/>
           </svg>
           <span>Upload image to<br>images/ folder</span>
         </div>`;

    const papersHTML = t.papers.length
      ? `<div class="theme-papers">
          ${t.papers.map(p => `
            <div class="paper-pill">
              ${p.url ? `<a href="${p.url}" target="_blank">${p.title}</a>` : `<span style="color:var(--black)">${p.title}</span>`}
              <span class="paper-venue">${p.venue}</span>
            </div>`).join('')}
         </div>`
      : '';

    container.innerHTML += `
      <div class="theme">
        <div class="theme-image">${imageHTML}</div>
        <div class="theme-content">
          <span class="theme-index">Theme 0${i + 1}</span>
          <h2 class="theme-title">${t.title}</h2>
          <p class="theme-desc">${t.description}</p>
          ${papersHTML}
        </div>
      </div>`;
  });
}

renderThemes(THEMES);
</script>
</body>
</html>
